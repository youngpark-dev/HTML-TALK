<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>HTML TALK</title>
  <style>
    :root {
      --bg: #f4f5f7;
      --panel: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --line: #e5e7eb;
      --mine: #2563eb;
      --mine-text: #ffffff;
      --other: #ffffff;
      --other-text: #111827;
      --danger: #dc2626;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    body {
      display: flex;
      justify-content: center;
    }

    .app {
      width: 100%;
      max-width: 520px;
      height: 100dvh;
      background: var(--panel);
      display: flex;
      flex-direction: column;
      border-left: 1px solid var(--line);
      border-right: 1px solid var(--line);
    }

    header {
      height: 58px;
      flex: 0 0 58px;
      padding: 0 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(10px);
    }

    .title {
      font-weight: 750;
      font-size: 17px;
      letter-spacing: -0.2px;
    }

    .status {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 14px 12px 18px;
      background: linear-gradient(#f8fafc, #f4f5f7);
    }

    .day {
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      margin: 10px 0 14px;
    }

    .row {
      display: flex;
      margin: 8px 0;
      gap: 7px;
      align-items: flex-end;
    }

    .row.mine {
      justify-content: flex-end;
    }

    .row.other {
      justify-content: flex-start;
    }

    .bubble-wrap {
      max-width: 76%;
      display: flex;
      flex-direction: column;
    }

    .name {
      font-size: 12px;
      color: var(--muted);
      margin: 0 0 3px 2px;
    }

    .bubble {
      padding: 10px 12px;
      border-radius: 17px;
      line-height: 1.42;
      font-size: 15px;
      word-break: break-word;
      white-space: pre-wrap;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }

    .mine .bubble {
      background: var(--mine);
      color: var(--mine-text);
      border-bottom-right-radius: 5px;
    }

    .other .bubble {
      background: var(--other);
      color: var(--other-text);
      border: 1px solid var(--line);
      border-bottom-left-radius: 5px;
    }

    .time {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 2px;
      white-space: nowrap;
    }

    .composer {
      flex: 0 0 auto;
      display: flex;
      gap: 8px;
      padding: 10px 10px calc(10px + env(safe-area-inset-bottom));
      border-top: 1px solid var(--line);
      background: rgba(255,255,255,0.98);
    }

    textarea {
      flex: 1;
      resize: none;
      min-height: 44px;
      max-height: 120px;
      padding: 11px 12px;
      border: 1px solid var(--line);
      border-radius: 14px;
      outline: none;
      font-family: inherit;
      font-size: 15px;
      line-height: 1.35;
      background: #ffffff;
    }

    textarea:focus {
      border-color: #93c5fd;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    button {
      width: 68px;
      border: none;
      border-radius: 14px;
      background: var(--mine);
      color: white;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(17,24,39,0.35);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 10;
    }

    .modal {
      width: 100%;
      max-width: 420px;
      background: white;
      border-radius: 20px;
      padding: 22px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }

    .modal h1 {
      margin: 0 0 8px;
      font-size: 22px;
      letter-spacing: -0.4px;
    }

    .modal p {
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .modal input {
      width: 100%;
      height: 46px;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 0 12px;
      font-size: 16px;
      margin-bottom: 10px;
    }

    .modal button {
      width: 100%;
      height: 46px;
      border-radius: 12px;
    }

    .error {
      color: var(--danger);
      font-size: 13px;
      margin-top: 8px;
      display: none;
    }

    .help {
      font-size: 12px;
      color: var(--muted);
      margin-top: 10px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div>
        <div class="title">HTML TALK</div>
      </div>
      <div class="status" id="status">연결 중</div>
    </header>

    <main class="messages" id="messages">
      <div class="day">대화를 시작하세요</div>
    </main>

    <form class="composer" id="form">
      <textarea id="input" rows="1" placeholder="메시지 입력" autocomplete="off"></textarea>
      <button id="send" type="submit">전송</button>
    </form>
  </div>

  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal">
      <h1>이름 설정</h1>
      <p>처음 한 번만 입력하면 이 브라우저에 저장됩니다.</p>
      <input id="nameInput" type="text" placeholder="예: 준영 / 수민" maxlength="20" />
      <button id="saveName" type="button">시작하기</button>
      <div class="error" id="nameError">이름을 입력하세요.</div>
      <div class="help">나중에 이름을 바꾸려면 브라우저 개발자도구에서 localStorage의 htmlTalkName 값을 삭제하거나, 시크릿 모드로 접속하면 됩니다.</div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
    import {
      getDatabase,
      ref,
      push,
      onChildAdded,
      serverTimestamp,
      query,
      limitToLast,
      onValue,
      set,
      onDisconnect
    } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDzsDedywZPd21zCddKeYU2lPkCZekrhto",
      authDomain: "html-talk.firebaseapp.com",
      databaseURL: "https://html-talk-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "html-talk",
      storageBucket: "html-talk.firebasestorage.app",
      messagingSenderId: "166321255139",
      appId: "1:166321255139:web:436f1a0784981fee2f0bd6"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const messagesEl = document.getElementById("messages");
    const formEl = document.getElementById("form");
    const inputEl = document.getElementById("input");
    const sendEl = document.getElementById("send");
    const statusEl = document.getElementById("status");
    const modalBackdrop = document.getElementById("modalBackdrop");
    const nameInput = document.getElementById("nameInput");
    const saveNameBtn = document.getElementById("saveName");
    const nameError = document.getElementById("nameError");

    const ROOM_ID = "main";
    const CLIENT_ID_KEY = "htmlTalkClientId";
    const NAME_KEY = "htmlTalkName";

    let clientId = localStorage.getItem(CLIENT_ID_KEY);
    if (!clientId) {
      clientId = crypto.randomUUID ? crypto.randomUUID() : String(Date.now()) + Math.random().toString(16).slice(2);
      localStorage.setItem(CLIENT_ID_KEY, clientId);
    }

    let userName = localStorage.getItem(NAME_KEY) || "";

    function showNameModal() {
      modalBackdrop.style.display = "flex";
      setTimeout(() => nameInput.focus(), 50);
    }

    function hideNameModal() {
      modalBackdrop.style.display = "none";
    }

    function saveName() {
      const value = nameInput.value.trim();
      if (!value) {
        nameError.style.display = "block";
        return;
      }
      userName = value;
      localStorage.setItem(NAME_KEY, userName);
      hideNameModal();
      setPresence();
    }

    if (!userName) showNameModal();

    saveNameBtn.addEventListener("click", saveName);
    nameInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") saveName();
    });

    const connectedRef = ref(db, ".info/connected");
    onValue(connectedRef, (snap) => {
      statusEl.textContent = snap.val() ? "온라인" : "오프라인";
    });

    function setPresence() {
      if (!userName) return;
      const userRef = ref(db, `rooms/${ROOM_ID}/presence/${clientId}`);
      set(userRef, {
        name: userName,
        online: true,
        updatedAt: serverTimestamp()
      });
      onDisconnect(userRef).set({
        name: userName,
        online: false,
        updatedAt: serverTimestamp()
      });
    }

    setPresence();

    const messagesRef = ref(db, `rooms/${ROOM_ID}/messages`);
    const recentMessagesQuery = query(messagesRef, limitToLast(200));

    function formatTime(timestamp) {
      if (!timestamp) return "";
      const d = new Date(timestamp);
      const hh = String(d.getHours()).padStart(2, "0");
      const mm = String(d.getMinutes()).padStart(2, "0");
      return `${hh}:${mm}`;
    }

    function scrollToBottom() {
      requestAnimationFrame(() => {
        messagesEl.scrollTop = messagesEl.scrollHeight;
      });
    }

    function addMessage(msg) {
      const isMine = msg.clientId === clientId;
      const row = document.createElement("div");
      row.className = `row ${isMine ? "mine" : "other"}`;

      const bubbleWrap = document.createElement("div");
      bubbleWrap.className = "bubble-wrap";

      if (!isMine) {
        const name = document.createElement("div");
        name.className = "name";
        name.textContent = msg.name || "상대";
        bubbleWrap.appendChild(name);
      }

      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.textContent = msg.text || "";
      bubbleWrap.appendChild(bubble);

      const time = document.createElement("div");
      time.className = "time";
      time.textContent = formatTime(msg.createdAt);

      if (isMine) {
        row.appendChild(time);
        row.appendChild(bubbleWrap);
      } else {
        row.appendChild(bubbleWrap);
        row.appendChild(time);
      }

      messagesEl.appendChild(row);
      scrollToBottom();
    }

    onChildAdded(recentMessagesQuery, (snapshot) => {
      const msg = snapshot.val();
      addMessage(msg);
    });

    async function sendMessage() {
      if (!userName) {
        showNameModal();
        return;
      }

      const text = inputEl.value.trim();
      if (!text) return;

      sendEl.disabled = true;
      try {
        await push(messagesRef, {
          clientId,
          name: userName,
          text,
          createdAt: serverTimestamp()
        });
        inputEl.value = "";
        resizeTextarea();
      } catch (err) {
        alert("메시지 전송에 실패했습니다. Firebase 규칙 또는 인터넷 연결을 확인하세요.");
        console.error(err);
      } finally {
        sendEl.disabled = false;
        inputEl.focus();
      }
    }

    formEl.addEventListener("submit", (e) => {
      e.preventDefault();
      sendMessage();
    });

    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    function resizeTextarea() {
      inputEl.style.height = "auto";
      inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + "px";
    }

    inputEl.addEventListener("input", resizeTextarea);
  </script>
</body>
</html>
